# Axis CLI 配置文件
# 里程碑 1 最小配置模板

# 核心内核配置
kernel:
  # 调度器配置
  scheduler:
    # 最大并发任务数（支持数万级）
    max_concurrent_tasks: 10000
    # 任务队列容量
    queue_capacity: 100000
    # 调度策略（可插拔）
    strategy: "fifo"  # fifo, priority, weighted

  # 分发器配置
  dispatcher:
    # 默认超时时间（秒）
    default_timeout: 300
    # 最大重试次数
    max_retries: 3
    # 重试退避策略（linear, exponential）
    retry_backoff: "exponential"

  # 生命周期配置
  lifecycle:
    # 优雅关闭超时（秒）
    shutdown_timeout: 30
    # 状态持久化路径
    state_persistence_path: "./var/state"
    # 崩溃恢复启用
    crash_recovery_enabled: true

# Human-as-a-Function 配置
human:
  # 协议配置
  protocol:
    # 默认超时时间（秒）
    default_timeout: 600
    # 最大超时时间（秒）
    max_timeout: 3600
    # 调用队列容量
    queue_capacity: 1000

  # 执行器配置
  executor:
    # 交互面板类型（console, web, tui）
    panel_type: "console"
    # 并发履约数
    concurrent_executions: 10

  # 解析器配置
  parser:
    # 默认解析策略
    default_strategy: "structured"
    # 解析超时（秒）
    parse_timeout: 30

# 工具调用层配置
tools:
  # 注册表配置
  registry:
    # 工具元数据存储路径
    metadata_path: "./var/tools"
    # 工具权限检查启用
    permission_check_enabled: true

  # 调用器配置
  invoker:
    # 调用缓存启用
    cache_enabled: false
    # 调用链追踪启用
    chain_tracing_enabled: true

# 权限管控配置
permissions:
  # 核心权限集（基础权限）
  core:
    - "kernel:schedule"
    - "kernel:dispatch"
    - "human:call"
    - "tool:invoke"

  # 扩展权限集（AI 增强等）
  extended:
    - "llm:complete"
    - "llm:stream"
    - "adapter:http"
    - "adapter:sdk"

# 日志配置（可选模块，里程碑 1 基础日志）
logging:
  # 日志级别
  level: "info"
  # 日志格式
  format: "json"
  # 日志输出路径
  output: "./var/logs/axis.log"
  # 日志轮转
  rotation:
    enabled: true
    max_size_mb: 100
    max_age_days: 7
    max_backups: 10
