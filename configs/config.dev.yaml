# Axis CLI 开发环境配置
# 用于本地开发和测试

kernel:
  scheduler:
    max_concurrent_tasks: 100
    queue_capacity: 1000
    strategy: "fifo"

  dispatcher:
    default_timeout: 60
    max_retries: 2
    retry_backoff: "linear"

  lifecycle:
    shutdown_timeout: 10
    state_persistence_path: "./var/state"
    crash_recovery_enabled: true

human:
  protocol:
    default_timeout: 300
    max_timeout: 1800
    queue_capacity: 100

  executor:
    panel_type: "console"
    concurrent_executions: 3

  parser:
    default_strategy: "structured"
    parse_timeout: 10

tools:
  registry:
    metadata_path: "./var/tools"
    permission_check_enabled: true

  invoker:
    cache_enabled: false
    chain_tracing_enabled: true

permissions:
  core:
    - "kernel:schedule"
    - "kernel:dispatch"
    - "human:call"
    - "tool:invoke"

  extended:
    - "llm:complete"
    - "llm:stream"
    - "adapter:http"
    - "adapter:sdk"

logging:
  level: "debug"
  format: "console"
  output: "stdout"
  rotation:
    enabled: false
