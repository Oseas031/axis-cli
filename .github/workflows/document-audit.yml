name: Document Audit

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.md'
      - 'docs/**'

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run markdownlint
        run: markdownlint '**/*.md' || true

  consistency-check:
    name: Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check consistency
        run: |
          # Check for outdated references
          if grep -r "shared_layer" --include="*.md" --include="*.go" . 2>/dev/null; then
            echo "Found outdated shared_layer references"
          fi
          # Check deprecated workflow references
          DEPRECATED="ci-cd-quality-improvement-workflow comprehensive-automation-workflows entry-workflow software-engineering-paradigm-workflow-improvement"
          for w in $DEPRECATED; do
            grep -r "$w" --include="*.md" docs/ 2>/dev/null && echo "Deprecated workflow: $w"
          done
