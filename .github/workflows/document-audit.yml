name: Document Audit

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.md'
      - 'docs/**'
      - 'workflow/**'
      - 'workflows/**'
      - 'reports/**'

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore 'docs/deprecated/**' --ignore 'reports/**' || true

  consistency-check:
    name: Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check consistency
        run: |
          # Check for outdated references
          if grep -r "shared_layer" --include="*.md" --include="*.go" . 2>/dev/null; then
            echo "Found outdated shared_layer references"
          fi
          # Check active docs for deprecated workflow references.
          # Historical archives are excluded to keep this audit actionable.
          DEPRECATED="ci-cd-quality-improvement-workflow comprehensive-automation-workflows entry-workflow software-engineering-paradigm-workflow-improvement"
          for w in $DEPRECATED; do
            grep -r "$w" --include="*.md" --exclude-dir=deprecated docs/ workflow/ workflows/ 2>/dev/null && echo "Deprecated workflow reference in active docs: $w"
          done
