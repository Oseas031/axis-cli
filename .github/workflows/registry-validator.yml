name: Workflow Registry Validator

on:
  schedule:
    - cron: '0 0 * * 0'  # 姣忓懆鏃ユ墽琛?
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/config/registry.yml'
      - '.github/workflows/*.yml'

jobs:
  validate-registry:
    name: Validate Workflow Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate registry structure
        run: |
          python3 << 'EOF'
          import yaml
          import sys
          import os
          import glob

          with open('.github/config/registry.yml', 'r') as f:
              registry = yaml.safe_load(f)

          # Check required fields
          required_fields = ['id', 'name', 'version', 'status', 'category', 'file']
          workflow_ids = set()
          errors = []

          for workflow in registry.get('workflows', []):
              # Check required fields
              for field in required_fields:
                  if field not in workflow:
                      errors.append(f"鉂?Workflow {workflow.get('id', 'unknown')} missing required field: {field}")

              # Skip further validation if required fields are missing
              if 'id' not in workflow or 'file' not in workflow:
                  continue

              # Check for duplicate IDs
              if workflow['id'] in workflow_ids:
                  errors.append(f"鉂?Duplicate workflow ID: {workflow['id']}")
              workflow_ids.add(workflow['id'])

              # Check if file exists with better error messages
              if not os.path.exists(workflow['file']):
                  errors.append(f"鉂?Workflow file does not exist: {workflow['file']}")
                  # Suggest similar files
                  if workflow['file'].startswith('docs/deprecated/'):
                      suggestions = glob.glob('docs/deprecated/workflows/*.md')
                      if suggestions:
                          errors.append(f"馃挕 Did you mean one of these?")
                          for s in suggestions[:3]:
                              errors.append(f"   - {s}")
                  elif workflow['file'].startswith('.github/workflows/'):
                      actual_files = glob.glob('.github/workflows/*.yml')
                      if actual_files:
                          errors.append(f"馃挕 Available workflow files:")
                          for f in actual_files[:5]:
                              errors.append(f"   - {f}")

              # Check if documentation exists with better error messages
              if 'documentation' in workflow and not os.path.exists(workflow['documentation']):
                  errors.append(f"鉂?Documentation file does not exist: {workflow['documentation']}")
                  # Check for common typos
                  if workflow['documentation'].startswith('/'):
                      errors.append(f"馃挕 Absolute path detected. Use relative path from repository root.")
                  if 'worklow' in workflow['documentation']:
                      errors.append(f"馃挕 Typo detected: 'worklow' should be 'workflow'")

          if errors:
              print("鉂?Registry validation failed:")
              for error in errors:
                  print(error)
              sys.exit(1)

          print("鉁?Registry structure validation passed")
          print(f"鉁?Validated {len(workflow_ids)} workflows")
          EOF

      - name: Check for orphaned workflows
        run: |
          python3 << 'EOF'
          import yaml
          import os
          import glob

          with open('.github/config/registry.yml', 'r') as f:
              registry = yaml.safe_load(f)

          # Get all registered workflow files
          registered_files = set()
          for workflow in registry.get('workflows', []):
              if 'file' in workflow:
                  registered_files.add(workflow['file'])

          # Get all actual workflow files
          actual_files = set()
          for file in glob.glob('.github/workflows/*.yml'):
              actual_files.add(file)

          # Check for unregistered workflows
          for file in actual_files - registered_files:
              print(f"鈿狅笍 Workflow file not in registry: {file}")

          # Check for registered files that don't exist
          for file in registered_files - actual_files:
              if file.endswith('.yml'):
                  print(f"鈿狅笍 Registered workflow file doesn't exist: {file}")

          print("鉁?Orphaned workflow check completed")
          EOF

      - name: Check for circular dependencies
        run: |
          python3 << 'EOF'
          import yaml
          from collections import defaultdict

          with open('.github/config/registry.yml', 'r') as f:
              registry = yaml.safe_load(f)

          # Build dependency graph
          graph = defaultdict(list)
          for workflow in registry.get('workflows', []):
              for dep in workflow.get('dependencies', []):
                  graph[workflow['id']].append(dep)

          # Check for circular dependencies
          def has_cycle(graph):
              visited = set()
              recursion_stack = set()

              def visit(node):
                  if node in recursion_stack:
                      return True
                  if node in visited:
                      return False
                  visited.add(node)
                  recursion_stack.add(node)
                  for neighbor in graph.get(node, []):
                      if visit(neighbor):
                          return True
                  recursion_stack.remove(node)
                  return False

              for node in graph:
                  if visit(node):
                      return True
              return False

          if has_cycle(graph):
              print("鉂?Circular dependencies detected")
              # Print the cycle
              for node in graph:
                  print(f"  {node} -> {graph[node]}")
          else:
              print("鉁?No circular dependencies detected")
          EOF

      - name: Generate registry health report
        run: |
          python3 << 'PYEOF'
          import yaml, os
          from datetime import datetime, timezone

          with open('.github/config/registry.yml', 'r') as f:
              registry = yaml.safe_load(f)

          active_count = 0
          deprecated_count = 0

          for workflow in registry.get('workflows', []):
              if workflow.get('status') == 'active':
                  active_count += 1
              elif workflow.get('status') == 'deprecated':
                  deprecated_count += 1

          total_count = len(registry.get('workflows', []))

          # Print key=value for any downstream bash steps that need them
          print(f"active_count={active_count}")
          print(f"deprecated_count={deprecated_count}")
          print(f"total_count={total_count}")

          # Write step summary directly from Python (avoid unset bash variable bugs)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a') as sf:
                  sf.write('# Workflow Registry Health Report\n\n')
                  sf.write('## Summary\n')
                  sf.write(f'- Total workflows: {total_count}\n')
                  sf.write(f'- Active workflows: {active_count}\n')
                  sf.write(f'- Deprecated workflows: {deprecated_count}\n')
                  sf.write(f'- Last validated: {datetime.now(timezone.utc).isoformat()}\n')
                  sf.write('\n## Status\n')
                  sf.write('鉁?Registry is healthy\n')
          PYEOF

  generate-index:
    name: Generate Workflow Index
    runs-on: ubuntu-latest
    needs: validate-registry
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Generate workflow index
        run: |
          python3 << 'EOF'
          import yaml
          from collections import defaultdict

          with open('.github/config/registry.yml', 'r') as f:
              registry = yaml.safe_load(f)

          # Group workflows by category
          categories = defaultdict(list)
          for workflow in registry.get('workflows', []):
              categories[workflow.get('category', 'uncategorized')].append(workflow)

          # Generate lightweight index aligned with the current routing docs.
          with open('workflows/README.md', 'w') as f:
              f.write('# 工作流索引\n\n')
              f.write('本文档只索引当前有效或仍需追溯的工作流。权威元数据以 .github/config/registry.yml 为准。\n\n')
              f.write('## 权威入口\n\n')
              f.write('- workflow/entry.md：任务到最小 workflow 组合的入口路由。\n')
              f.write('- workflow/meta-workflow-management.md：工作流维护规则与同步清单。\n')
              f.write('- .github/config/registry.yml：工作流状态、路径、依赖的机器可读注册表。\n\n')

              f.write('## 当前活跃的 GitHub Actions\n\n')
              f.write('| ID | 名称 | 文件路径 |\n')
              f.write('|---|---|---|\n')
              for workflow in registry.get('workflows', []):
                  if workflow.get('status') == 'active' and workflow.get('file', '').startswith('.github/workflows/'):
                      f.write(f"| `{workflow['id']}` | {workflow['name']} | `{workflow['file']}` |\n")

              f.write('\n## 当前活跃的文档工作流\n\n')
              f.write('| ID | 名称 | 文件路径 |\n')
              f.write('|---|---|---|\n')
              for workflow in registry.get('workflows', []):
                  if workflow.get('status') == 'active' and not workflow.get('file', '').startswith('.github/workflows/'):
                      f.write(f"| `{workflow['id']}` | {workflow['name']} | `{workflow['file']}` |\n")

              f.write('\n## 废弃的工作流\n\n')
              f.write('| ID | 名称 | 当前处理 |\n')
              f.write('|---|---|---|\n')
              for workflow in registry.get('workflows', []):
                  if workflow.get('status') == 'deprecated':
                      f.write(f"| `{workflow['id']}` | {workflow['name']} | {workflow.get('note', workflow['file'])} |\n")

              f.write('\n## 相关文档\n\n')
              f.write('- [工作流入口路由](../workflow/entry.md)\n')
              f.write('- [Meta-Workflow 管理](../workflow/meta-workflow-management.md)\n')
              f.write('- [工作流注册表](../.github/config/registry.yml) - 完整的工作流元数据\n')
              f.write('- [工作流最佳实践](../docs/workflow/workflow-best-practices.md)\n')
              f.write('- [工作流报告索引](../reports/README.md)\n')

          print("✅ Workflow index generated")
          EOF

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet workflows/README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

# Standard: Git push requires GitHub Actions bot write permissions
# Configure in Repository Settings > Actions > General > Workflow permissions
# See .github/workflows/CODING_STANDARDS.md section 5.2
      - name: Commit changes
        if: false  # Disabled for milestone 1 acceptance - requires write permissions
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add workflows/README.md
          git commit -m "chore: auto-generate workflow index from registry"
          git push origin HEAD:${{ github.ref }}

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-registry, generate-index]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Registry Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Registry Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.validate-registry.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Index Generation" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.generate-index.result }}" >> $GITHUB_STEP_SUMMARY

