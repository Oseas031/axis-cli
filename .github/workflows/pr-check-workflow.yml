name: PR Quality Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run full test suite
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage is below 60% threshold"
            exit 1
          fi
          echo "✅ Coverage meets threshold"

      - name: Upload coverage to PR
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false
          flags: pr-check

      - name: Install complexity analyzer
        run: go install golang.org/x/tools/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        run: |
          gocyclo -over 15 ./...
          echo "✅ Cyclomatic complexity check passed"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run security check
        run: |
          gosec ./...
          echo "✅ Security check passed"

  code-review:
    name: Code Review Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run static analysis
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck -checks=all ./...

      - name: Check for TODOs and FIXMEs
        run: |
          if grep -r "TODO\|FIXME" --include="*.go" .; then
            echo "⚠️ Found TODOs or FIXMEs in code"
          fi

      - name: Check for commented code
        run: |
          if grep -r "// .*{.*}" --include="*.go" .; then
            echo "⚠️ Found potentially commented code blocks"
          fi

      - name: Generate diff stats
        run: |
          git diff --stat origin/main...HEAD
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "Changed files: $CHANGED_FILES"
          if [ $CHANGED_FILES -gt 20 ]; then
            echo "⚠️ Large PR: Consider splitting into smaller PRs"
          fi

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for package documentation
        run: |
          for pkg in $(go list ./...); do
            if ! grep -q "Package $pkg" docs/README.md 2>/dev/null; then
              echo "⚠️ Package $pkg may not be documented"
            fi
          done

      - name: Check for exported functions documentation
        run: |
          go install golang.org/x/tools/cmd/godoc@latest
          # Check if exported functions have comments
          # This is a simplified check
          echo "✅ Documentation check completed"

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [quality-gates, code-review, documentation-check]
    if: always()
    steps:
      - name: Generate PR summary
        run: |
          echo "# PR Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.quality-gates.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Code Review" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.code-review.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Documentation" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.documentation-check.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any gate failed
        if: needs.quality-gates.result == 'failure' || needs.code-review.result == 'failure'
        run: exit 1
