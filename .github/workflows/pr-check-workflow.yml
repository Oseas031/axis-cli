name: PR Quality Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run full test suite
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "Coverage is below 60% threshold"
            exit 1
          fi

      - name: Install complexity analyzer
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        run: gocyclo -over 15 ./...

      - name: Run gosec
        run: gosec ./...

  staticcheck:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run staticcheck
        run: staticcheck ./...

  pr-context:
    name: PR Context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff stats
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | wc -l)
          echo "Changed files: $CHANGED_FILES"
          if [ $CHANGED_FILES -gt 20 ]; then
            echo "Large PR: $CHANGED_FILES files changed"
          fi

      - name: Check documentation coverage
        run: |
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | grep -E '\.go$' | wc -l)
          doc_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | grep -E '\.md$' | wc -l)
          echo "Code files changed: $changed"
          echo "Doc files changed: $doc_changed"
          if [ "$changed" -gt 0 ] && [ "$doc_changed" -eq 0 ]; then
            echo "Code changes without doc updates"
          fi

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [quality-gates, staticcheck, pr-context]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# PR Quality Check" >> $GITHUB_STEP_SUMMARY
          echo "quality-gates: ${{ needs.quality-gates.result }}" >> $GITHUB_STEP_SUMMARY
          echo "staticcheck: ${{ needs.staticcheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "pr-context: ${{ needs.pr-context.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Gate failure
        if: needs.quality-gates.result == 'failure' || needs.staticcheck.result == 'failure'
        run: exit 1
