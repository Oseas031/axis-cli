name: Monitoring and Observability

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  health-check:
    name: Dependency Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check outdated dependencies
        run: |
          go list -u -m all > outdated.txt
          OUTDATED=$(grep -c "\[" outdated.txt || echo "0")
          echo "Outdated dependencies: $OUTDATED"
          if [ "$OUTDATED" -gt 0 ]; then
            cat outdated.txt
          fi
