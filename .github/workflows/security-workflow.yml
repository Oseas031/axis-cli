name: Security Scanning

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  pull_request:
    branches: [ main, develop ]

jobs:
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=json -out=gosec-report.json ./...
          
      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec-report.json
          retention-days: 30

# Standard: Avoid duplicate tools with overlapping functionality
# govulncheck covers dependency vulnerability checking
# nancy tool removed due to Git authentication issues
# See .github/workflows/CODING_STANDARDS.md section 6.1
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Check for known vulnerabilities
        run: |
          echo "✅ govulncheck already covers dependency vulnerability checking"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  license-compliance:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: List dependencies
        run: go list -json -m all | grep -E '"Path"|"Version"'

      - name: Check for non-permissive licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --disallowed_types=forbidden,restricted
          echo "✅ License compliance check passed"

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast, sca, secret-scan, license-compliance]
    if: always()
    steps:
      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## SAST (Static Analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.sast.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## SCA (Dependency Analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.sca.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Secret Scanning" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## License Compliance" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.license-compliance.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any security check failed
        if: needs.sast.result == 'failure' || needs.sca.result == 'failure' || needs.secret-scan.result == 'failure'
        run: exit 1
