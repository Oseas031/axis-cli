name: Security Scanning

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request:
    branches: [ main, develop ]

jobs:
  gosec-scan:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run gosec
        run: gosec -fmt=json -out=gosec-report.json ./...

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-report.json
          retention-days: 30

  govuln-scan:
    name: SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run govulncheck
        run: govulncheck ./...

  secret-scan:
    name: Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [gosec-scan, govuln-scan, secret-scan]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "gosec: ${{ needs.gosec-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "govulncheck: ${{ needs.govuln-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "secrets: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Gate failure
        if: needs.gosec-scan.result == 'failure' || needs.govuln-scan.result == 'failure'
        run: exit 1
