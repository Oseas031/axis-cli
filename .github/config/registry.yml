# Workflow Categories
categories:
  - id: meta
    name: Meta Workflows
    description: Workflows that manage other workflows
  - id: documentation
    name: Documentation Workflows
    description: Process and architecture documentation
  - id: development
    name: Development Workflows
    description: Local development automation
  - id: quality
    name: Quality Workflows
    description: Quality assurance and checks
  - id: ci
    name: Continuous Integration
    description: Build and test automation
  - id: security
    name: Security Workflows
    description: Security scanning and compliance
  - id: cd
    name: Continuous Delivery
    description: Release and deployment automation
  - id: monitoring
    name: Monitoring Workflows
    description: System monitoring and observability

# Workflow Status Values
status_values:
  - value: draft
    description: Workflow is in draft state, not yet implemented
  - value: review
    description: Workflow is under review
  - value: approved
    description: Workflow is approved, waiting for deployment
  - value: active
    description: Workflow is active and in use
  - value: paused
    description: Workflow is temporarily paused
  - value: deprecated
    description: Workflow is deprecated, will be removed
  - value: removed
    description: Workflow has been removed
  - value: abandoned
    description: Workflow has been abandoned

# Workflow Type Values
type_values:
  - value: process
    description: Process documentation workflow
  - value: architecture
    description: Architecture documentation workflow
  - value: management
    description: Workflow management workflow
  - value: dispatcher
    description: Workflow dispatcher/router
  - value: automation
    description: Automated execution workflow
    description: Automated execution workflow
